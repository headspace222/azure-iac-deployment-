#cloud-config

package_update: true
package_upgrade: true

packages:
  - nginx

write_files:
  - path: /var/www/html/index.html
    permissions: '0644'
    owner: root:root
    content: |
      <!DOCTYPE html>
      <html lang="en">
      <head>
          <meta charset="UTF-8">
          <title>Azure IaC Deployment</title>
          <style>
              body {
                  font-family: Arial, sans-serif;
                  background: #f5f5f5;
                  padding: 40px;
                  text-align: center;
              }
              .card {
                  background: white;
                  padding: 30px;
                  border-radius: 10px;
                  display: inline-block;
                  box-shadow: 0 0 10px rgba(0,0,0,0.1);
              }
              h1 {
                  color: #0078d4;
              }
          </style>
      </head>
      <body>
          <div class="card">
              <h1>Azure IaC Deployment</h1>
              <p>This VM was deployed using modular Bicep templates.</p>
              <p>Served automatically using cloud-init and NGINX.</p>
          </div>
      </body>
      </html>

runcmd:
  - systemctl enable nginx
  - systemctl start nginx
